name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ed-doctor compara HEAD contra origin/main; necesita el ref.
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ed-doctor (health check)
        run: bash scripts/ed-doctor.sh

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Build (Next.js)
        run: pnpm build
